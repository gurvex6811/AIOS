<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOS — AI-Integrated Operating System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:       #07080f;
    --bg-panel:      rgba(12, 14, 28, 0.85);
    --bg-card:       rgba(16, 18, 38, 0.9);
    --bg-hover:      rgba(80, 60, 180, 0.15);
    --accent-purple: #7c5fff;
    --accent-blue:   #3b8bff;
    --accent-cyan:   #00d4ff;
    --accent-green:  #00e98a;
    --accent-amber:  #ffa940;
    --accent-red:    #ff4d6a;
    --text-primary:  #e8eaf6;
    --text-secondary:#8b90b8;
    --text-dim:      #4a5080;
    --border:        rgba(100, 80, 220, 0.18);
    --glow-purple:   0 0 18px rgba(124,95,255,0.4);
    --glow-blue:     0 0 18px rgba(59,139,255,0.4);
    --glow-cyan:     0 0 18px rgba(0,212,255,0.4);
    --radius-sm:     8px;
    --radius-md:     12px;
    --radius-lg:     16px;
  }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    overflow: hidden;
    user-select: none;
  }

  /* ─── BACKGROUND ─────────────────────────────────── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 110%, rgba(80,40,200,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 20% 80%, rgba(30,60,180,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 20%, rgba(100,50,220,0.12) 0%, transparent 60%),
      linear-gradient(170deg, #07080f 0%, #080c1a 50%, #07080f 100%);
  }
  .bg-stars {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%,  rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 5%  60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 88%, rgba(255,255,255,0.4) 0%, transparent 100%);
  }

  /* ─── TOP BAR ─────────────────────────────────────── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 38px; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    background: rgba(7, 8, 15, 0.8);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    font-size: 11.5px;
  }
  .topbar-left { display: flex; align-items: center; gap: 20px; color: var(--text-secondary); }
  .topbar-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    text-align: center;
  }
  .topbar-center .logo-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 17px; font-weight: 700; letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .topbar-center .tagline {
    font-size: 9px; letter-spacing: 3px; color: var(--text-dim);
    margin-top: -2px; text-transform: uppercase;
  }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .topbar-icon { width: 16px; height: 16px; opacity: 0.5; cursor: pointer; transition: opacity 0.2s; }
  .topbar-icon:hover { opacity: 1; }
  .ai-core-badge {
    font-size: 10px; color: var(--accent-cyan);
    background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
    padding: 2px 8px; border-radius: 20px;
    box-shadow: 0 0 10px rgba(0,212,255,0.2);
  }
  .avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; cursor: pointer;
  }

  /* ─── LAYOUT ─────────────────────────────────────── */
  .layout {
    position: fixed; top: 38px; bottom: 72px; left: 0; right: 0; z-index: 10;
    display: grid;
    grid-template-columns: 88px 1fr;
    gap: 0;
  }

  /* ─── SIDEBAR ─────────────────────────────────────── */
  .sidebar {
    background: rgba(8,10,22,0.9);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 16px 0;
    gap: 4px;
    backdrop-filter: blur(20px);
  }
  .sidebar-logo {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(124,95,255,0.3), rgba(59,139,255,0.2));
    border: 1px solid rgba(124,95,255,0.4);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
    box-shadow: var(--glow-purple);
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 900;
    color: var(--accent-purple);
  }
  .sidebar-logo-label { font-size: 9px; color: var(--accent-purple); letter-spacing: 1px; }
  .sidebar-logo-sub   { font-size: 8px; color: var(--text-dim); }
  .nav-item {
    width: 76px; padding: 8px 4px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; border-radius: var(--radius-sm);
    transition: background 0.2s;
    color: var(--text-dim);
    font-size: 9.5px;
  }
  .nav-item:hover, .nav-item.active {
    background: var(--bg-hover);
    color: var(--accent-purple);
  }
  .nav-item svg { width: 18px; height: 18px; }
  .sidebar-divider { width: 40px; height: 1px; background: var(--border); margin: 8px 0; }

  /* ─── MAIN AREA ───────────────────────────────────── */
  .main {
    display: grid;
    grid-template-columns: 300px 1fr 290px;
    grid-template-rows: 1fr;
    gap: 10px;
    padding: 10px 10px 10px 10px;
    overflow: hidden;
  }

  /* ─── LEFT COLUMN ─────────────────────────────────── */
  .col-left { display: flex; flex-direction: column; gap: 10px; }

  /* Nexus Orb */
  .nexus-orb-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px;
    display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(16px);
  }
  .orb-container {
    width: 54px; height: 54px; flex-shrink: 0;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .orb {
    width: 42px; height: 42px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #a78bff, #5b3fff 50%, #1a0f6e);
    box-shadow: 0 0 20px rgba(124,95,255,0.7), 0 0 40px rgba(124,95,255,0.3);
    animation: orbPulse 3s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%,100% { box-shadow: 0 0 20px rgba(124,95,255,0.7), 0 0 40px rgba(124,95,255,0.3); }
    50%      { box-shadow: 0 0 30px rgba(124,95,255,0.9), 0 0 60px rgba(124,95,255,0.5); }
  }
  .orb-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(124,95,255,0.3);
    animation: ringExpand 2s ease-out infinite;
  }
  .orb-ring:nth-child(2) { width: 52px; height: 52px; animation-delay: 0s; }
  .orb-ring:nth-child(3) { width: 62px; height: 62px; animation-delay: 0.5s; }
  @keyframes ringExpand {
    0%   { opacity: 0.8; transform: scale(0.9); }
    100% { opacity: 0;   transform: scale(1.4); }
  }
  .orb-text { flex: 1; }
  .orb-text .listening { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .orb-text .question   { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; }
  .waveform {
    margin-top: 8px; display: flex; align-items: center; gap: 2px; height: 16px;
  }
  .waveform-bar {
    width: 3px; border-radius: 2px;
    background: linear-gradient(to top, var(--accent-purple), var(--accent-cyan));
    animation: waveBounce 1.2s ease-in-out infinite;
  }
  .waveform-bar:nth-child(1)  { height: 5px;  animation-delay: 0.0s; }
  .waveform-bar:nth-child(2)  { height: 10px; animation-delay: 0.1s; }
  .waveform-bar:nth-child(3)  { height: 14px; animation-delay: 0.2s; }
  .waveform-bar:nth-child(4)  { height: 8px;  animation-delay: 0.3s; }
  .waveform-bar:nth-child(5)  { height: 12px; animation-delay: 0.4s; }
  .waveform-bar:nth-child(6)  { height: 6px;  animation-delay: 0.5s; }
  .waveform-bar:nth-child(7)  { height: 10px; animation-delay: 0.6s; }
  .waveform-bar:nth-child(8)  { height: 14px; animation-delay: 0.7s; }
  .waveform-bar:nth-child(9)  { height: 7px;  animation-delay: 0.8s; }
  .waveform-bar:nth-child(10) { height: 11px; animation-delay: 0.9s; }
  .waveform-bar:nth-child(11) { height: 5px;  animation-delay: 1.0s; }
  .waveform-bar:nth-child(12) { height: 9px;  animation-delay: 1.1s; }
  @keyframes waveBounce {
    0%,100% { transform: scaleY(1);   }
    50%      { transform: scaleY(1.8); }
  }

  /* Active Context */
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    backdrop-filter: blur(16px);
  }
  .panel-title {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 10px; font-weight: 600;
  }
  .context-mode {
    display: flex; align-items: center; gap: 8px;
    background: rgba(124,95,255,0.1); border: 1px solid rgba(124,95,255,0.25);
    border-radius: var(--radius-sm); padding: 6px 10px; margin-bottom: 10px;
    font-size: 12px;
  }
  .context-mode svg { width: 13px; height: 13px; color: var(--accent-purple); }
  .context-mode span { flex: 1; color: var(--text-primary); font-weight: 500; }
  .badge-icon {
    width: 20px; height: 20px; border-radius: 4px;
    background: rgba(124,95,255,0.2); border: 1px solid rgba(124,95,255,0.3);
    display: flex; align-items: center; justify-content: center; font-size: 9px;
  }
  .context-meta { display: flex; gap: 8px; margin-bottom: 10px; }
  .meta-item { flex: 1; }
  .meta-label { font-size: 9px; color: var(--text-dim); }
  .meta-val   { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .context-icons { display: flex; gap: 8px; margin-bottom: 12px; }
  .ctx-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    cursor: pointer; transition: background 0.2s;
  }
  .ctx-icon:hover { background: var(--bg-hover); }
  .productivity-label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; color: var(--text-secondary); margin-bottom: 5px;
  }
  .productivity-val { font-size: 16px; font-weight: 700; color: var(--accent-purple); }
  .progress-bar {
    height: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
    box-shadow: 0 0 8px rgba(124,95,255,0.5);
    transition: width 1.5s ease;
  }

  /* System Vitals */
  .vitals-grid { display: flex; flex-direction: column; gap: 7px; }
  .vital-row {
    display: flex; align-items: center; gap: 8px; font-size: 11px;
  }
  .vital-label { width: 36px; color: var(--text-dim); font-size: 10px; }
  .vital-val   { width: 52px; color: var(--text-primary); font-weight: 500; }
  .vital-bar { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.06); overflow: hidden; }
  .vital-fill { height: 100%; border-radius: 2px; }
  .vital-fill.purple { background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); }
  .vital-fill.blue   { background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }
  .vital-fill.green  { background: var(--accent-green); }
  .vital-fill.amber  { background: var(--accent-amber); }
  .vitals-donut {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
  }
  .donut-container { position: relative; width: 56px; height: 56px; }
  .donut-label {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--text-primary);
  }
  .donut-sub { font-size: 7px; color: var(--text-dim); }
  .vitals-row2 { display: flex; gap: 8px; }
  .vital-mini {
    flex: 1; font-size: 9.5px;
    display: flex; align-items: center; gap: 4px;
    color: var(--text-secondary);
  }
  .spark { display: flex; align-items: flex-end; gap: 1.5px; height: 14px; }
  .spark-bar { width: 3px; border-radius: 1px; background: var(--accent-blue); opacity: 0.7; }

  /* ─── CENTER COLUMN ───────────────────────────────── */
  .col-center { display: flex; flex-direction: column; gap: 0; position: relative; overflow: hidden; }

  /* Hero */
  .hero {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
  }
  .hero-greeting { font-size: 24px; font-weight: 300; color: var(--text-primary); text-align: center; }
  .hero-sub { font-size: 13px; color: var(--text-secondary); margin-top: 4px; text-align: center; }

  /* Central Logo Ring */
  .logo-ring-container {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .logo-rings {
    position: relative; width: 340px; height: 340px;
    display: flex; align-items: center; justify-content: center;
  }
  .ring {
    position: absolute; border-radius: 50%;
    border: 1px solid;
    animation: rotateSlow linear infinite;
  }
  .ring1 { width: 180px; height: 180px; border-color: rgba(124,95,255,0.3); animation-duration: 20s; }
  .ring2 { width: 240px; height: 240px; border-color: rgba(59,139,255,0.2); animation-duration: 30s; animation-direction: reverse; }
  .ring3 { width: 300px; height: 300px; border-color: rgba(0,212,255,0.15); animation-duration: 40s; }
  .ring4 { width: 340px; height: 340px; border-color: rgba(124,95,255,0.08); animation-duration: 50s; animation-direction: reverse; }
  @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .ring-dot {
    position: absolute; top: -3px; left: 50%; transform: translateX(-50%);
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-purple);
    box-shadow: 0 0 8px var(--accent-purple);
  }
  .logo-center {
    width: 90px; height: 90px; border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, rgba(124,95,255,0.4), rgba(30,20,80,0.9));
    border: 2px solid rgba(124,95,255,0.5);
    box-shadow: 0 0 40px rgba(124,95,255,0.5), 0 0 80px rgba(124,95,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 32px; font-weight: 900;
    color: rgba(124,95,255,0.9);
    animation: centerGlow 4s ease-in-out infinite;
    z-index: 2;
  }
  @keyframes centerGlow {
    0%,100% { box-shadow: 0 0 40px rgba(124,95,255,0.5), 0 0 80px rgba(124,95,255,0.2); }
    50%      { box-shadow: 0 0 60px rgba(124,95,255,0.8), 0 0 120px rgba(124,95,255,0.4); }
  }
  /* ground glow beam */
  .beam {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 300px;
    background: linear-gradient(to bottom, rgba(124,95,255,0.3), transparent);
    clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);
    pointer-events: none;
  }

  /* ─── RIGHT COLUMN ────────────────────────────────── */
  .col-right { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
  .col-right::-webkit-scrollbar { display: none; }

  /* Nexus Graph */
  .graph-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px;
    height: 220px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(16px);
  }
  .graph-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .graph-title { font-size: 12px; font-weight: 600; }
  .graph-sub   { font-size: 9px; color: var(--text-dim); margin-top: 2px; }
  .live-badge {
    display: flex; align-items: center; gap: 4px;
    font-size: 9px; color: var(--accent-green);
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 6px var(--accent-green);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  #graph-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* Active Agents */
  .agent-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .agent-item:last-child { border-bottom: none; }
  .agent-avatar {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(124,95,255,0.3), rgba(59,139,255,0.2));
    border: 1px solid rgba(124,95,255,0.3);
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .agent-info { flex: 1; }
  .agent-name { font-size: 11.5px; font-weight: 500; }
  .agent-role { font-size: 9.5px; color: var(--text-dim); margin-top: 1px; }
  .agent-status {
    font-size: 9.5px; display: flex; align-items: center; gap: 4px;
  }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; }
  .status-dot.green  { background: var(--accent-green); box-shadow: 0 0 5px var(--accent-green); }
  .status-dot.amber  { background: var(--accent-amber); box-shadow: 0 0 5px var(--accent-amber); animation: blink 1s infinite; }
  .panel-manage {
    font-size: 9.5px; color: var(--accent-blue); cursor: pointer;
    display: flex; justify-content: flex-end; margin-bottom: 8px;
  }
  .panel-footer-btn {
    margin-top: 10px; width: 100%; padding: 7px;
    background: rgba(59,139,255,0.1); border: 1px solid rgba(59,139,255,0.2);
    border-radius: var(--radius-sm); font-size: 10px;
    color: var(--accent-blue); cursor: pointer; text-align: center;
    transition: background 0.2s;
  }
  .panel-footer-btn:hover { background: rgba(59,139,255,0.2); }

  /* Live Insights */
  .insight-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 11px;
  }
  .insight-item:last-child { border-bottom: none; }
  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-text { color: var(--text-secondary); line-height: 1.4; }
  .insight-bold { color: var(--text-primary); font-weight: 500; }
  .see-all {
    margin-top: 8px; width: 100%; padding: 6px;
    background: rgba(124,95,255,0.1); border: 1px solid rgba(124,95,255,0.2);
    border-radius: var(--radius-sm); font-size: 10px;
    color: var(--accent-purple); cursor: pointer; text-align: center;
    transition: background 0.2s;
  }
  .see-all:hover { background: rgba(124,95,255,0.2); }

  /* Upcoming */
  .upcoming-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-time { font-size: 10px; color: var(--text-dim); width: 42px; flex-shrink: 0; padding-top: 2px; }
  .upcoming-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
  }
  .dot-green { background: var(--accent-green); box-shadow: 0 0 5px var(--accent-green); }
  .dot-amber { background: var(--accent-amber); box-shadow: 0 0 5px var(--accent-amber); }
  .dot-blue  { background: var(--accent-blue);  box-shadow: 0 0 5px var(--accent-blue); }
  .upcoming-title { font-size: 11.5px; font-weight: 500; }
  .upcoming-sub   { font-size: 9.5px; color: var(--text-dim); margin-top: 1px; }
  .upcoming-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
  }
  .add-btn {
    font-size: 9px; color: var(--accent-blue); cursor: pointer;
    background: rgba(59,139,255,0.1); border: 1px solid rgba(59,139,255,0.2);
    padding: 2px 8px; border-radius: 10px;
  }

  /* Weather */
  .weather-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 12px;
    backdrop-filter: blur(16px);
  }
  .weather-main { display: flex; align-items: center; gap: 10px; }
  .weather-icon { font-size: 30px; }
  .weather-temp { font-size: 26px; font-weight: 300; }
  .weather-desc { font-size: 10px; color: var(--text-dim); }
  .weather-loc  { font-size: 9.5px; color: var(--text-dim); margin-top: 2px; }
  .weather-week { display: flex; justify-content: space-between; margin-top: 10px; }
  .weather-day  { text-align: center; font-size: 9px; color: var(--text-dim); }
  .weather-day .wday { margin-bottom: 3px; }
  .weather-day .wtemp { font-size: 10px; color: var(--text-secondary); font-weight: 500; }

  /* Media Hub */
  .media-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 12px;
    backdrop-filter: blur(16px);
  }
  .media-title   { font-size: 12px; font-weight: 600; }
  .media-song    { font-size: 13px; font-weight: 600; margin-top: 10px; }
  .media-service { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .media-visual  {
    width: 100%; height: 50px; border-radius: 8px; margin: 10px 0;
    background: linear-gradient(135deg, #1a0d40, #2d1060, #0d2080);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; overflow: hidden; position: relative;
  }
  .media-wave { display: flex; align-items: flex-end; gap: 2px; height: 30px; }
  .media-wave-bar {
    width: 3px; border-radius: 2px;
    background: linear-gradient(to top, var(--accent-purple), var(--accent-cyan));
    animation: waveBounce 0.8s ease-in-out infinite;
  }
  .media-controls {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px;
  }
  .ctrl-btn { font-size: 14px; cursor: pointer; color: var(--text-secondary); transition: color 0.2s; }
  .ctrl-btn:hover { color: var(--text-primary); }
  .ctrl-play {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; cursor: pointer;
    box-shadow: 0 0 12px rgba(124,95,255,0.5);
  }
  .media-progress { margin-top: 8px; }
  .media-prog-bar { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .media-prog-fill {
    height: 100%; width: 33%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
  }
  .media-time { display: flex; justify-content: space-between; font-size: 8.5px; color: var(--text-dim); margin-top: 3px; }

  /* ─── BOTTOM DOCK ─────────────────────────────────── */
  .dock {
    position: fixed; bottom: 0; left: 0; right: 0; height: 72px; z-index: 100;
    background: rgba(7, 8, 15, 0.85);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px);
    display: flex; flex-direction: column; align-items: center;
  }
  .search-bar-wrap { padding: 8px 180px 0; width: 100%; }
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    background: rgba(20,22,45,0.9);
    border: 1px solid rgba(124,95,255,0.25);
    border-radius: 30px;
    padding: 7px 16px;
    box-shadow: 0 0 20px rgba(124,95,255,0.1);
  }
  .search-icon { font-size: 13px; color: var(--accent-purple); }
  .search-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'Inter', sans-serif; font-size: 12px;
    color: var(--text-secondary);
    caret-color: var(--accent-purple);
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-mic { font-size: 14px; color: var(--text-dim); cursor: pointer; }
  .dock-icons {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 4px 0; width: 100%;
  }
  .dock-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 2px 12px; cursor: pointer; border-radius: 8px;
    transition: background 0.2s; color: var(--text-dim);
    font-size: 8.5px;
  }
  .dock-item:hover { background: var(--bg-hover); color: var(--text-secondary); }
  .dock-item.active {
    background: rgba(124,95,255,0.15);
    color: var(--accent-purple);
  }
  .dock-item svg { width: 16px; height: 16px; }
  .dock-separator { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }
  .dock-center-icon {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(124,95,255,0.4), rgba(59,139,255,0.3));
    border: 1px solid rgba(124,95,255,0.5);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 16px rgba(124,95,255,0.4);
    cursor: pointer;
    font-size: 14px;
  }
  .dock-power {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,77,106,0.15); border: 1px solid rgba(255,77,106,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; cursor: pointer; color: var(--accent-red);
  }

  /* ─── SCROLLBAR ───────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(124,95,255,0.3); border-radius: 2px; }

  /* ─── TOOLTIP ─────────────────────────────────────── */
  [title]:hover::after {
    content: attr(title);
    position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
    background: rgba(20,22,45,0.95); color: var(--text-primary);
    font-size: 10px; padding: 3px 8px; border-radius: 4px; white-space: nowrap;
    border: 1px solid var(--border); pointer-events: none; z-index: 999;
  }

  /* ─── ANIMATIONS ─────────────────────────────────── */
  .fade-in { animation: fadeIn 0.6s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in:nth-child(1) { animation-delay: 0.1s; }
  .fade-in:nth-child(2) { animation-delay: 0.2s; }
  .fade-in:nth-child(3) { animation-delay: 0.3s; }
  .fade-in:nth-child(4) { animation-delay: 0.4s; }
</style>
</head>
